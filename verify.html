<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Demo verification step.">
  <title>Secure</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Styling for the Debug Panel */
    .debug-panel {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e40af;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-family: monospace;
      font-size: 0.9rem;
      text-align: center;
    }
    .debug-code {
      font-weight: bold;
      font-size: 1.2rem;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="card">
      <div class="form-header">
        <div class="logo-container">
          <img src="logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
        </div>
      </div>

      <p class="login-prompt">OTP Verification</p>
      
      <div class="debug-panel" id="debugPanel">
        System Code: <span class="debug-code" id="debugExpectedCode">Loading...</span><br>
        Next refresh in: <span id="debugTimer">60</span>s
      </div>

      <div class="message-banner" id="verifyMessage"></div>

      <form class="auth-form" id="verifyForm">
        <div class="input-group">
          <div class="input-label-container">
            <label for="verificationCode" class="input-label">Enter Authenticator Code</label>
          </div>
          <div class="input-wrapper">
            <input type="text" id="verificationCode" class="form-input verification-input" placeholder="0000" maxlength="4" inputmode="numeric" autocomplete="one-time-code" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="verifyBtn">
          <span class="btn-text">Verify</span>
          <span class="spinner" id="verifySpinner"></span>
        </button>

        <a href="index.html" class="old-services-link">Back to sign in</a>
      </form>
    </div>
  </div>

<script src="https://unpkg.com/@otplib/preset-browser@12.0.1/buffer.js"></script>
<script src="https://unpkg.com/@otplib/preset-browser@12.0.1/index.js"></script>

  <script>
    // Your 16-character test secret key
    const SHARED_SECRET = 'JBSWY3DPEHPK3PXP'; 

    // Explicitly enforce the 4-digit, 60-second rules
    window.otplib.totp.options = { 
      digits: 4, 
      step: 60,
      window: 1 // Leniency window for slight device time drift
    };

    const verifyForm = document.getElementById('verifyForm');
    const verifyMessage = document.getElementById('verifyMessage');
    const verifyBtn = document.getElementById('verifyBtn');
    const verifyBtnText = verifyBtn.querySelector('.btn-text');
    const verifySpinner = verifyBtn.querySelector('.spinner');
    const verificationCode = document.getElementById('verificationCode');

    function showVerifyMessage(text, type) {
      verifyMessage.innerText = text;
      verifyMessage.className = `message-banner ${type}`;
      verifyMessage.style.display = 'block';
    }

    function setVerifyLoading(isLoading) {
      verifyBtn.disabled = isLoading;
      verifyBtnText.style.opacity = isLoading ? '0' : '1';
      verifySpinner.style.display = isLoading ? 'block' : 'none';
    }

    // Lock text box input length strictly to 4 numeric digits
    verificationCode.addEventListener('input', () => {
      verificationCode.value = verificationCode.value.replace(/\D/g, '').slice(0, 4);
    });

    verifyForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const userEnteredCode = verificationCode.value.trim();

      // Enforce single-use token constraints per session
      if (sessionStorage.getItem('usedCode') === userEnteredCode) {
        showVerifyMessage('This code has already been used. Please wait for the next 1-minute cycle.', 'error');
        return;
      }

      // Check current calculation match against your secret
      const isValidToken = window.otplib.totp.check(userEnteredCode, SHARED_SECRET);

      if (!isValidToken) {
        showVerifyMessage('Invalid Authenticator Code. Please check your system time or debug panel.', 'error');
        return;
      }

      // Mark code as spent
      sessionStorage.setItem('usedCode', userEnteredCode);

      setVerifyLoading(true);

      setTimeout(() => {
        sessionStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('lastActivityTime', Date.now().toString());
        
        window.location.replace('home.html');
      }, 700);
    });
  </script>
</body>
</html>
